name: CI

on:
  push:
  pull_request:

permissions: read-all

jobs:
  lint:
    name: Lint (OpenJDK 8)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
    - name: Set up JDK 8
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: '8'
        distribution: 'temurin'
        
    - name: Cache Maven packages
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ github.ref }}-${{ hashFiles('**/pom.xml') }}-lint
        restore-keys: |
          ${{ runner.os }}-m2-${{ github.ref }}-
          ${{ runner.os }}-m2-
          
    - name: Run lint
      run: ./mvnw verify -B -Dhttps.protocols=TLSv1.2 -DskipTests

  jdk7-verification:
    name: JDK 7 verification
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
    - name: Set up JDK 8
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: '8'
        distribution: 'temurin'
        
    - name: Cache Maven packages
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ github.ref }}-${{ hashFiles('**/pom.xml') }}-jdk7
        restore-keys: |
          ${{ runner.os }}-m2-${{ github.ref }}-
          ${{ runner.os }}-m2-
          
    - name: Build JMXFetch
      run: ./mvnw clean package -DskipTests

    - name: Run using JDK 7
      run: docker run -i --rm -v $(pwd):/app -w /app azul/zulu-openjdk:7-latest java -jar ./target/jmxfetch-0.52.1-SNAPSHOT-jar-with-dependencies.jar --help

  test:
    name: Test (OpenJDK ${{ matrix.java-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        java-version:
          - 8
          - 11
          - 17
          - 21
          - 24 # Latest JDK version

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
    - name: Set up JDK ${{ matrix.java-version }}
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: ${{ matrix.java-version }}
        distribution: 'temurin'
        
    - name: Cache Maven packages
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ github.ref }}-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-m2-${{ github.ref }}-
          ${{ runner.os }}-m2-
          
    - name: Set up Docker
      uses: docker/setup-docker-action@1a6edb0ba9ac496f6850236981f15d8f9a82254d # v5.0.0
      
    - name: Run tests
      run: ./mvnw test -B -Dhttps.protocols=TLSv1.2 -Dcheckstyle.skip=true -Dtests.log_level=info -Djdk.attach.allowAttachSelf=true
      
    - name: Show test logs on failure
      if: failure()
      run: |
        echo "Test failed. Showing surefire reports:"
        for log in target/surefire-reports/*.txt; do
          if [ -f "$log" ]; then
            echo "$log ========================"
            cat "$log"
          fi
        done
