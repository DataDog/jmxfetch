init_config:

instances:
  -   process_name_regex: .*surefire.*
      default-jmx-metrics-definitions: simplified-default-jmx-metrics.yaml
      refresh_beans: 4
      name: jmx_test_instance1
      conf:
        - include:
            domain: org.datadog.jmxfetch.test
            attribute:
              ShouldBeCounter:
                metric_type: counter
                alias: test.counter
  -   process_name_regex: .*surefire.*
      default-jmx-metrics-definitions: simplified-default-jmx-metrics.yaml
      refresh_beans: 4
      name: jmx_test_instance2
      conf:
        - include:
            domain: org.datadog.jmxfetch.test
            attribute:
              ShouldBeCounter:
                metric_type: rate
                alias: test.rate
