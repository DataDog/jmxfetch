init_config:

instances:
    -   process_name_regex: .*surefire.*
        default-jmx-metrics-definitions: simplified-default-jmx-metrics.yaml
        name: jmx_test_instance
        tags:
            env: stage
            newTag: test
        conf:
            - include:
               domain: org.datadog.jmxfetch.test
               bean: singleBeanName
               parameter: singleParameterValue
            - include:
               domain: org.datadog.jmxfetch.test
               bean:
                    - firstBeanName
                    - secondBeanName
               parameter:
                    - firstParameterValue
                    - secondParameterValue
                    - thirdParameterValue
