init_config:

instances:
    -   process_name_regex: .*surefire.*
        default-jmx-metrics-definitions: simplified-default-jmx-metrics.yaml
        name: jmx_test_instance
        conf:
            - include:
                  attribute:
                      ShouldBe100:
                          metric_type: gauge
                          alias: this.is.100
              exclude:
                  class: org.datadog.jmxfetch.TestApp$1SimpleTestJavaAnotherApp
