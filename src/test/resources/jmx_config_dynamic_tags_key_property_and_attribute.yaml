init_config:

instances:
    -   process_name_regex: .*surefire.*
        name: jmx_config_dynamic_tags_key_property_and_attribute_test
        conf:
            - include:
                  domain: org.datadog.jmxfetch.test
                  type: DynamicTagTestApp
                  attribute:
                      Metric:
                          metric_type: gauge
                          alias: test.key.property.and.attribute.metric
              dynamic_tags:
                  - tag_name: app_id
                    bean_name: org.datadog.jmxfetch.test:type=DynamicTagTestApp,name=*
                    key_property: name
                  - tag_name: cluster_id
                    bean_name: org.datadog.jmxfetch.test:type=DynamicTagTestApp,name=Broker1
                    attribute: ClusterId
